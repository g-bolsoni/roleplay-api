version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: roleplay-api-db
    environment:
      POSTGRES_USER: ${DB_USER:-roleplay_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-roleplay_password}
      POSTGRES_DB: ${DB_NAME:-roleplay_db}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-roleplay_user}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - roleplay-network

volumes:
  postgres_data:

networks:
  roleplay-network:
    driver: bridge
